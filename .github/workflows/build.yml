name: Needlelight CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    name: Frontend + Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Tauri icon
        run: node -e "const fs=require('fs');const path=require('path');const b='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=';const icons=['icon.png','icon-512.png'];for (const file of icons){const iconPath=path.join('src-tauri','icons',file);if(!fs.existsSync(iconPath)){fs.mkdirSync(path.dirname(iconPath),{recursive:true});fs.writeFileSync(iconPath,Buffer.from(b,'base64'));}}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml


  release-build:
    name: Build desktop bundles
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Needlelight-Linux
          - os: windows-latest
            artifact_name: Needlelight-Windows
          - os: macos-latest
            artifact_name: Needlelight-macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Tauri icon
        run: node -e "const fs=require('fs');const path=require('path');const b='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=';const icons=['icon.png','icon-512.png'];for (const file of icons){const iconPath=path.join('src-tauri','icons',file);if(!fs.existsSync(iconPath)){fs.mkdirSync(path.dirname(iconPath),{recursive:true});fs.writeFileSync(iconPath,Buffer.from(b,'base64'));}}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm tauri build --bundles appimage

      - name: Build Tauri bundles (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm tauri build --bundles nsis

      - name: Build Tauri bundles (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm tauri build --bundles dmg

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload portable exe
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Needlelight-Windows-Portable
          path: src-tauri/target/release/needlelight-tauri.exe

      - name: Publish GitHub Release (Linux)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Publish GitHub Release (Windows)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub Release (macOS)
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
